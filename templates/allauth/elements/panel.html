{% load allauth %}
<div class="card shadow-sm mb-4">
    <div class="card-header">
        <h2 class="card-title h5 mb-0">
            {% slot title %}
            {% endslot %}
        </h2>
    </div>
    <div class="card-body">
        {% slot body %}
        {% endslot %}
    </div>
        {% if slots.actions %}
        <div class="card-footer">
            <ul class="list-inline mb-0">
                {% for action in slots.actions %}<li class="list-inline-item">{{ action }}</li>{% endfor %}
            </ul>
        </div>
        {% endif %}
</div>
